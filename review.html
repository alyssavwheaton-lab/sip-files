<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review – Eagle SIP Suite Files</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; background: #f8f9fa; }

        /* Sidebar */
        .sidebar { width: 320px; min-width: 320px; background: #1a1a2e; color: #fff; overflow-y: auto; display: flex; flex-direction: column; }
        .sidebar-header { padding: 1.25rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-header h1 { font-size: 1rem; font-weight: 700; letter-spacing: 0.02em; }
        .sidebar-header p { font-size: 0.75rem; color: rgba(255,255,255,0.5); margin-top: 0.25rem; }

        .section-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.4); padding: 1rem 1rem 0.5rem; }
        .nav-list { list-style: none; padding: 0 0.5rem 0.5rem; }
        .nav-item { display: block; padding: 0.5rem 0.75rem; margin-bottom: 2px; border-radius: 6px; font-size: 0.8rem; color: rgba(255,255,255,0.75); cursor: pointer; transition: all 0.15s ease; text-decoration: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .nav-item.active { background: #0d6efd; color: #fff; }

        .badge { display: inline-block; font-size: 0.6rem; padding: 1px 6px; border-radius: 10px; margin-right: 6px; font-weight: 600; vertical-align: middle; }
        .badge-landing { background: #198754; color: #fff; }
        .badge-hub { background: #0d6efd; color: #fff; }
        .badge-content { background: #ffc107; color: #000; }
        .badge-review { background: #dc3545; color: #fff; }
        .badge-amplify { background: #6f42c1; color: #fff; }
        .badge-other { background: #6c757d; color: #fff; }

        /* Main preview area */
        .main { flex: 1; display: flex; flex-direction: column; }
        .toolbar { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1rem; background: #fff; border-bottom: 1px solid #dee2e6; }
        .toolbar .filename { font-size: 0.85rem; font-weight: 600; color: #495057; }
        .toolbar .actions { display: flex; gap: 0.5rem; }
        .toolbar button, .toolbar a { font-size: 0.75rem; padding: 0.35rem 0.75rem; border-radius: 6px; border: 1px solid #dee2e6; background: #fff; color: #495057; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; transition: all 0.15s ease; }
        .toolbar button:hover, .toolbar a:hover { background: #e9ecef; border-color: #adb5bd; }

        .preview-frame { flex: 1; border: none; background: #fff; }
        .empty-state { flex: 1; display: flex; align-items: center; justify-content: center; color: #adb5bd; font-size: 1.1rem; }

        /* Responsive */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; min-width: unset; max-height: 40vh; }
            .main { min-height: 60vh; }
        }
    </style>
</head>
<body>

            { file: "Amplify Your Income Potential _ Eagle Asset Management SIP Suite.html", label: "Amplify Income – SIP Suite", cat: "amplify" },
            { file: "Amplify Your Income Potential _ Eagle Asset Management SIP Suite_moving amp.html", label: "SIP Suite – Moving Amp", cat: "amplify" },
            { file: "Amplify Your Income Potential _ Eagle Asset Management.html", label: "Amplify Income Potential", cat: "amplify" },

            { file: "SIP_Suite_Amplify_CloudPage_v1.html", label: "Amplify CloudPage v1", cat: "amplify" },

            // MC Content Blocks

            { file: "eagle-sip-mc-content-block_13.html",  label: "MC Content Block v13", cat: "content" },
            { file: "eagle-sip-mc-content-block_14.html",  label: "MC Content Block v14", cat: "content" },

            // Review Files
            { file: "review_eagle-sip-amplify-hub.html",       label: "Review: Amplify Hub",       cat: "review" },
            { file: "review_eagle-sip-amplify-hub copy.html",  label: "Review: Amplify Hub (copy)", cat: "review" },
            { file: "review_eagle-sip-amplify-hub_1.html",     label: "Review: Amplify Hub v1",    cat: "review" },

            { file: "review_eagle-sip-suite-landing_3.html",   label: "Review: Suite Landing v3",  cat: "review" },
            { file: "review_eagle-sip-suite-landing_4.html",   label: "Review: Suite Landing v4",  cat: "review" },

            // Other
            { file: "SIP_Suite_Cloud_Page_Wireframe.html",        label: "Cloud Page Wireframe",       cat: "other" },
            { file: "SFMC-SmartCapture-EmbedBlock.html",           label: "SFMC SmartCapture Embed",    cat: "other" },
            { file: "eagle-sip-thankyou-page.html",                label: "Thank You Page",             cat: "other" },
            { file: "sip_strategy_cards_optimized_2.28.html",      label: "Strategy Cards (2/28)",      cat: "other" },
            { file: "sip_strategy_cards_tab at top.html",          label: "Strategy Cards (Tab Top)",   cat: "other" },
        ];

        const badgeClass = { landing: "badge-landing", hub: "badge-hub", amplify: "badge-amplify", content: "badge-content", review: "badge-review", other: "badge-other" };
        const badgeLabel = { landing: "Landing", hub: "Hub", amplify: "Amplify", content: "Content", review: "Review", other: "Other" };
        const listMap   = { landing: "landing-list", hub: "hub-list", amplify: "amplify-list", content: "content-list", review: "review-list", other: "other-list" };

        let currentIndex = -1;
        const allItems = [];

        files.forEach((f, i) => {
            const ul = document.getElementById(listMap[f.cat]);
            if (!ul) return;
            const li = document.createElement("li");
            li.className = "nav-item";
            li.dataset.index = i;
            li.innerHTML = `<span class="badge ${badgeClass[f.cat]}">${badgeLabel[f.cat]}</span>${f.label}`;
            li.addEventListener("click", () => loadFile(i));
            ul.appendChild(li);
            allItems.push(li);
        });

        function loadFile(index) {
            if (index < 0 || index >= files.length) return;
            currentIndex = index;
            const f = files[index];
            document.getElementById("preview").src = f.file;
            document.getElementById("current-filename").textContent = f.file;
            document.getElementById("btn-open").href = f.file;
            allItems.forEach(el => el.classList.remove("active"));
            allItems[index].classList.add("active");
            allItems[index].scrollIntoView({ block: "nearest", behavior: "smooth" });
        }

        function navigate(dir) {
            const next = currentIndex + dir;
            if (next >= 0 && next < files.length) loadFile(next);
        }

        document.addEventListener("keydown", e => {
            if (e.key === "ArrowUp" || (e.key === "ArrowLeft" && !e.metaKey)) { e.preventDefault(); navigate(-1); }
            if (e.key === "ArrowDown" || (e.key === "ArrowRight" && !e.metaKey)) { e.preventDefault(); navigate(1); }
        });

        // Load the first file by default
        loadFile(0);
    </script>

</html>
